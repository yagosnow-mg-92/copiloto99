name: Build APK Copiloto 99

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: corrida99
        run: |
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
          ./gradlew assembleDebug --warning-mode=none

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Copiloto99-APK
          path: corrida99/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
